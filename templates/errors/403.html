{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center fade-in" style="min-height:60vh">
  <i class="bi bi-shield-lock" style="font-size:3.5rem;color:var(--kfu-danger)"></i>
  <h1 style="margin-top:16px;font-size:1.6rem;font-weight:800;color:var(--kfu-navy)">403 — Access Denied</h1>
  <p style="color:var(--text-muted);max-width:420px;margin-top:8px">
    You don't have permission to view this page. If you believe this is a mistake, contact your Dean.
  </p>
  <a href="{{ url_for('main.index') }}" class="btn-primary-kfu" style="margin-top:18px">
    <i class="bi bi-house"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
