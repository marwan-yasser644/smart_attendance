<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Already Submitted</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Sora',sans-serif;
      background:linear-gradient(135deg,#1e3a5f,#1a3a8f,#2563eb);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .card {
      background:white; border-radius:24px; padding:40px;
      max-width:380px; width:100%; text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,.3);
      animation:popIn .4s ease both;
    }
    @keyframes popIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    .icon {
      width:72px; height:72px; background:#dbeafe;
      border-radius:50%; margin:0 auto 20px;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; color:#2563eb;
    }
    h1 { font-size:1.45rem; font-weight:800; color:#0f172a; margin-bottom:8px; }
    p  { color:#64748b; font-size:.88rem; line-height:1.6; }
    .info-box {
      background:#dbeafe; border:1px solid #bfdbfe; border-radius:12px;
      padding:14px; margin-top:20px;
    }
    .info-box .name { font-weight:700; color:#1e293b; font-size:.95rem; }
    .info-box .time {
      font-family:'JetBrains Mono',monospace; font-size:.82rem;
      color:#3b82f6; margin-top:5px; font-weight:600;
    }
    .info-box .detail { font-size:.78rem; color:#64748b; margin-top:3px; }
    .logos { display:flex; gap:10px; justify-content:center; margin-top:20px; opacity:.6; }
    .logos img { height:36px; width:36px; object-fit:contain;
                 background:#0d1b4b; border-radius:8px; padding:3px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="bi bi-info-circle-fill"></i></div>
  <h1>Already Recorded</h1>
  <p>Your attendance for this session was already submitted. Each student can only submit once per session.</p>
  <div class="info-box">
    <div class="name">{{ student_name }}</div>
    <div class="time">Submitted at {{ submitted_at.strftime('%H:%M:%S, %d %b %Y') }}</div>
    <div class="detail">{{ sess.course_code }} — {{ sess.title }}</div>
  </div>
  <div class="logos">
    <img src="{{ url_for('static', filename='images/logo_kfs.png') }}" alt="KFU">
    <img src="{{ url_for('static', filename='images/logo_ai.png') }}" alt="AI">
  </div>
</div>
</body>
</html>
