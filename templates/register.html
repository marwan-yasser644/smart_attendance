<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — KFU Smart Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --navy:#0d1b4b; --accent:#2563eb; --surface:#f0f4ff; }
    body { font-family:'Sora',sans-serif; background:var(--surface); min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:20px; }
    .card {
      background:white; border-radius:20px; padding:40px;
      max-width:460px; width:100%;
      box-shadow:0 8px 40px rgba(13,27,75,.12);
    }
    .logos { display:flex; gap:12px; justify-content:center; margin-bottom:20px; }
    .logos img { height:52px; width:52px; object-fit:contain;
                 background:var(--navy); border-radius:10px; padding:4px; }
    h1 { font-size:1.55rem; font-weight:800; color:var(--navy); text-align:center; margin-bottom:4px; }
    .sub { color:#64748b; font-size:.85rem; text-align:center; margin-bottom:28px; }
    label { font-size:.82rem; font-weight:600; color:#1e293b; display:block; margin-bottom:6px; }
    .input-wrap { position:relative; margin-bottom:16px; }
    .input-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; }
    input {
      width:100%; padding:11px 12px 11px 36px;
      border:1.5px solid #e2e8f0; border-radius:10px;
      font-family:'Sora',sans-serif; font-size:.88rem;
      transition:border-color .18s, box-shadow .18s;
    }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .btn-register {
      width:100%; background:var(--accent); color:white;
      border:none; border-radius:10px; padding:12px;
      font-family:'Sora',sans-serif; font-size:.95rem; font-weight:700;
      cursor:pointer; transition:all .2s; margin-top:6px;
    }
    .btn-register:hover { background:#1d4ed8; transform:translateY(-1px); }
    .back-link { display:block; text-align:center; margin-top:16px; color:var(--accent);
                 font-size:.85rem; font-weight:600; text-decoration:none; }
    .back-link:hover { text-decoration:underline; }
    .alert { border-radius:10px; font-size:.85rem; border:none; padding:10px 14px; }
    .alert-danger { background:#fee2e2; color:#991b1b; }
    .fade-in { animation:fadeIn .35s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>
<div class="card fade-in">
  <div class="logos">
    <img src="{{ url_for('static', filename='images/logo_kfs.png') }}" alt="KFU">
    <img src="{{ url_for('static', filename='images/logo_ai.png') }}" alt="AI">
  </div>
  <h1>Create Account</h1>
  <p class="sub">Register as a lecturer to get started</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
    {% endfor %}{% endif %}
  {% endwith %}

  <form method="POST">
    <div>
      <label>Full Name</label>
      <div class="input-wrap">
        <i class="bi bi-person"></i>
        <input type="text" name="name" placeholder="Dr. Ahmed Hassan" required>
      </div>
    </div>
    <div>
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="bi bi-envelope"></i>
        <input type="email" name="email" placeholder="lecturer@kfu.edu.eg" required>
      </div>
    </div>
    <div>
      <label>Password</label>
      <div class="input-wrap">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" placeholder="Min. 8 characters" required minlength="6">
      </div>
    </div>
    <div>
      <label>Confirm Password</label>
      <div class="input-wrap">
        <i class="bi bi-lock-fill"></i>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
    </div>
    <button type="submit" class="btn-register">Create Account</button>
  </form>
  <a href="{{ url_for('login') }}" class="back-link">← Back to Sign In</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
